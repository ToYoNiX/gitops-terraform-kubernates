apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.7.2
    helm:
      values: |
        grafana:
          adminPassword: "admin"
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - monitoring-devops-depi.duckdns.org
            tls:
              - hosts:
                  - monitoring-devops-depi.duckdns.org
                secretName: devops-depi-tls
          grafana.ini:
            server:
              root_url: "%(protocol)s://%(domain)s"
          sidecar:
            datasources:
              uid: prometheus
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
        prometheus:
          prometheusSpec:
            retention: 15d
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
        # k3s runs the scheduler, controller-manager, and proxy inside the
        # single k3s binary and uses no etcd — the stack's default monitors
        # for them can never scrape anything, so their *Down alerts fire
        # forever. Disable them or they drown out real alerts.
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        alertmanager:
          enabled: true
          alertmanagerSpec:
            # Mounted at /etc/alertmanager/secrets/<name>/ — created manually
            # on the cluster, never committed (same rule as duckdns-token):
            #   kubectl create secret generic alertmanager-discord-webhook \
            #     --from-literal=webhook-url=<discord-webhook-url> -n monitoring
            secrets:
              - alertmanager-discord-webhook
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: discord
              group_by: [namespace, alertname]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              routes:
                # Watchdog is an always-firing heartbeat — never notify on it
                - receiver: "null"
                  matchers:
                    - alertname = "Watchdog"
            receivers:
              - name: "null"
              - name: discord
                discord_configs:
                  - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord-webhook/webhook-url
                    send_resolved: true
            inhibit_rules:
              - target_matchers: [severity =~ warning|info]
                source_matchers: [severity = critical]
                equal: [namespace, alertname]
              - target_matchers: [severity = info]
                source_matchers: [severity = warning]
                equal: [namespace, alertname]
              - target_matchers: [severity = info]
                source_matchers: [alertname = InfoInhibitor]
                equal: [namespace]
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

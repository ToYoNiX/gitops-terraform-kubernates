apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.14.5
    helm:
      values: |
        installCRDs: true
        # Route the DNS-01 propagation self-check through cluster CoreDNS
        # (which resolves duckdns.org over DoT) instead of querying the
        # authoritative nameservers directly — the ISP drops TXT queries
        # on port 53.
        extraArgs:
          - --dns01-recursive-nameservers-only
          - --dns01-recursive-nameservers=10.43.0.10:53
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

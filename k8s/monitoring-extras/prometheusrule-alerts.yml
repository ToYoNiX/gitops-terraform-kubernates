# Custom alert rules on top of the kube-prometheus-stack defaults.
# The label `release: monitoring` is required: Prometheus's ruleSelector only
# picks up PrometheusRules carrying the Helm release name.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: depi-custom-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: depi.node.rules
      rules:
        - alert: NodeHighCpuUsage
          expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.instance }}"
            description: "CPU usage on {{ $labels.instance }} has been above 80% for 10 minutes (currently {{ $value | printf \"%.1f\" }}%)."

        - alert: NodeHighMemoryUsage
          expr: (100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100)) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory on {{ $labels.instance }}"
            description: "Memory usage on {{ $labels.instance }} has been above 85% for 10 minutes (currently {{ $value | printf \"%.1f\" }}%)."

        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} is down"
            description: "node-exporter on {{ $labels.instance }} has been unreachable for 2 minutes."

    - name: depi.workload.rules
      rules:
        - alert: PodRestartingTooOften
          expr: increase(kube_pod_container_status_restarts_total{namespace=~"prod|dev"}[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in the last 15 minutes."

        - alert: InventoryBackendDown
          expr: up{job="backend"} == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Inventory backend down in {{ $labels.namespace }}"
            description: "Prometheus cannot scrape the inventory backend in namespace {{ $labels.namespace }} ({{ $labels.instance }}) for 3 minutes."
